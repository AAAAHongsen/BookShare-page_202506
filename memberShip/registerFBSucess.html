<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登入成功</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background-color: #e6d396;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .success-box {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background-color: #ffffff;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      width: 350px;
      height: 200px;
    }

    .success-box h1 {
      color: #3b5c4e;
      margin-bottom: 20px;
    }

    .success-box p {
      font-size: 18px;
      margin-bottom: 30px;
      justify-content: center;
    }

    .success-box a {
      display: inline-block;
      padding: 12px 25px;
      font-size: 16px;
      color: white;
      background-color: #3b5c4e;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.3s;
    }

    .success-box a:hover {
      background-color: black;
      color: white;
      font-weight: bolder;
    }
  </style>
</head>

<body>
  <div class="success-box">
    <h1>FB 註 冊 成 功</h1>
    <p>您已成功註冊。</p>
    <a href="main.html">回首頁</a>
  </div>
</body>

</html>
