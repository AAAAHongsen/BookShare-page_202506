<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>Facebook 登入</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #e6d396;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      width: 360px;
      text-align: center;
    }

    .login-card h2 {
      margin-bottom: 20px;
      color: #3b5998;
    }

    .login-card button {
      padding: 12px 30px;
      background: #3b5998;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .login-card button img {
      width: 20px;
      height: 20px;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      color: #4a90e2;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <h2>Facebook 註 冊</h2>
    <a href="registerFBNext.html">
      <button>
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" alt="Facebook Logo">
        註 冊 Facebook 帳 號
      </button>
    </a>
    <br>
    <a href="memberRegister.html">← 返回主註冊頁</a>
  </div>
</body>

</html>
