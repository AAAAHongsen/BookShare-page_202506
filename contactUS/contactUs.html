<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們</title>
    <link rel="stylesheet" href="contactUs.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <div class="container">
        <div class="left-section">
            <canvas id="canvas3d"></canvas>
        </div>
        <div class="right-section">
            <div class="contact-info">
                <h1 style="display: flex; align-items: center;"><img src="../img/logo.png" alt="" draggable="false" style="width: 100px;"> BOOKSHARE</h1>
                <div class="info-item">
                    <h2>電話</h2>
                    <p>+886 101 482 596</p>
                </div>
                <div class="info-item">
                    <h2>Email</h2>
                    <p>bookshare@mail.yzu.edu.tw</p>
                </div>
                
                <form class="contact-form">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">電子郵件</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">訊息內容</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">送出</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 回到主頁按鈕 -->
    <a href="../home/home.html" class="home-button" title="回主頁">&#8962;</a>

    <script src="contactUs.js"></script>
</body>
</html>
